name: Trigger Website Update

# Triggers electerm.org to refresh the Android release info (download links,
# latest version, etc.) whenever a new electerm-android release is published.
on:
  release:
    types: [published]

jobs:
  trigger-website-update:
    runs-on: ubuntu-latest
    environment: build
    strategy:
      matrix:
        repository:
          - electerm/electerm.org
    steps:
      - name: Trigger ${{ matrix.repository }} repository workflow
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.PAT_REPO_TOKEN }}
          repository: ${{ matrix.repository }}
          event-type: electerm-android-release
