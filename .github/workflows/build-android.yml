name: Build Android APK

on:
  push:
    branches: [dev]

jobs:
  build:
    name: Build electerm Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: ci init
        run: npm config set legacy-peer-deps true

      - name: Install root dependencies (electerm + build tooling)
        run: npm i

      - name: Install Capacitor dependencies
        run: npm --prefix build/android install

      - name: Build web frontend + Node.js backend bundle
        run: npm run build:android

      - name: Add Android platform (first run only)
        run: cd build/android && [ -d android ] || npx cap add android

      - name: Sync Capacitor (copies web assets + native plugins)
        run: cd build/android && npx cap sync android

      - name: Ensure nodejs-mobile gradle variable is defined
        # @capawesome/capacitor-nodejs expects $nodejsMobileVersion to be set.
        # Append on its own line (variables.gradle has no trailing newline, so a
        # plain `echo >>` would concatenate onto the closing `}` and break Gradle).
        run: |
          cd build/android/android
          grep -q "nodejsMobileVersion" variables.gradle || \
            printf '\next.nodejsMobileVersion = "18.20.4-capawesome.1"\n' >> variables.gradle

      - name: Apply icon / splash overlay
        run: |
          # AndroidManifest.xml must go at app/src/main/, NOT inside res/.
          # Copy the electerm manifest (with icon, theme, network config) to
          # the correct location, overwriting Capacitor's default.
          MANIFEST_SRC=build/android/res-overlay/AndroidManifest.xml
          MANIFEST_DST=build/android/android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST_SRC" ]; then
            cp "$MANIFEST_SRC" "$MANIFEST_DST"
            echo "Overlayed AndroidManifest.xml -> $MANIFEST_DST"
          fi

          # Copy all resource dirs (drawable, mipmap-*, values, xml) into res/.
          # Using overlay/. merges directory contents into the destination
          # without creating extra nesting levels.
          cp -r build/android/res-overlay/. build/android/android/app/src/main/res/

          # Capacitor's default template ships its own drawable/splash.png and
          # values/ic_launcher_background.xml. These collide with our overlay's
          # splash.xml / colors-electerm.xml (same resource name, different file),
          # so drop the template's copies after overlaying ours.
          rm -f build/android/android/app/src/main/res/drawable/splash.png
          rm -f build/android/android/app/src/main/res/values/ic_launcher_background.xml

      - name: Configure per-ABI APK splits
        # Produce one APK per architecture (arm64-v8a, armeabi-v7a, x86_64)
        # plus a universal build, instead of a single ~160MB universal blob.
        # The second `android { }` block is cumulative with Capacitor's
        # template app/build.gradle; output renaming is done post-build in
        # shell to avoid AGP-version-specific output-name APIs.
        run: |
          GRADLE=build/android/android/app/build.gradle
          grep -q 'splits' "$GRADLE" || printf '%s\n' \
            '' \
            '// electerm: split per ABI (injected by CI)' \
            'android {' \
            '    splits {' \
            '        abi {' \
            '            enable true' \
            '            reset()' \
            "            include 'arm64-v8a', 'armeabi-v7a', 'x86_64'" \
            '            universalApk true' \
            '        }' \
            '    }' \
            '}' >> "$GRADLE"
          tail -n 15 "$GRADLE"

      - name: Build debug APK
        run: cd build/android/android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Build release APK (signed with persistent keystore)
        env:
          ANDROID_RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          ANDROID_RELEASE_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
          ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
        run: |
          cd build/android/android
          KEYSTORE="$PWD/app/release.keystore"
          printf '%s' "$ANDROID_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          keytool -list -keystore "$KEYSTORE" -storepass "$ANDROID_RELEASE_KEYSTORE_PASSWORD"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE" \
            -Pandroid.injected.signing.store.password="$ANDROID_RELEASE_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$ANDROID_RELEASE_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$ANDROID_RELEASE_KEY_PASSWORD"

      - name: Rename APKs to electerm-android-{arch}-{version}.apk
        # Version comes from package.json. Each per-ABI APK is renamed to
        # electerm-android-{arch}-{version}.apk (release) /
        # electerm-android-{arch}-{version}-debug.apk (debug). The {arch} is
        # parsed from gradle's per-ABI output filename; falls back to
        # "universal" for the universal build (or if splits are off).
        run: |
          VERSION=$(node -p "require('./package.json').version")
          APKROOT=build/android/android/app/build/outputs/apk
          mkdir -p "$APKROOT/named"
          for variant in debug release; do
            dir="$APKROOT/$variant"
            [ -d "$dir" ] || continue
            for apk in "$dir"/*.apk; do
              [ -f "$apk" ] || continue
              name=$(basename "$apk")
              arch=$(printf '%s' "$name" | grep -oE 'arm64-v8a|armeabi-v7a|x86_64|universal' | head -1)
              [ -z "$arch" ] && arch=universal
              if [ "$variant" = release ]; then
                out="electerm-android-$arch-$VERSION.apk"
              else
                out="electerm-android-$arch-$VERSION-debug.apk"
              fi
              cp "$apk" "$APKROOT/named/$out"
              echo "  $variant/$name -> named/$out"
            done
          done
          echo "=== named APKs ==="
          ls -la "$APKROOT/named/"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: electerm-android-apks
          path: build/android/android/app/build/outputs/apk/named/*.apk
          if-no-files-found: error
          retention-days: 30
