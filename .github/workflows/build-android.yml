name: Build Android APK

on:
  push:
    branches: [dev]

jobs:
  build:
    name: Build electerm Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: ci init
        run: npm config set legacy-peer-deps true

      - name: Install root dependencies (electerm + build tooling)
        run: npm i

      - name: Install Capacitor dependencies
        run: npm --prefix build/android install

      - name: Build web frontend + Node.js backend bundle
        run: npm run build:android

      - name: Add Android platform (first run only)
        run: cd build/android && [ -d android ] || npx cap add android

      - name: Sync Capacitor (copies web assets + native plugins)
        run: cd build/android && npx cap sync android

      - name: Ensure nodejs-mobile gradle variable is defined
        # @capawesome/capacitor-nodejs expects $nodejsMobileVersion to be set.
        # Append on its own line (variables.gradle has no trailing newline, so a
        # plain `echo >>` would concatenate onto the closing `}` and break Gradle).
        run: |
          cd build/android/android
          grep -q "nodejsMobileVersion" variables.gradle || \
            printf '\next.nodejsMobileVersion = "18.20.4-capawesome.1"\n' >> variables.gradle

      - name: Apply icon / splash overlay
        run: |
          cp -r build/android/res-overlay/. build/android/android/app/src/main/res/
          # Capacitor's default template ships its own drawable/splash.png and
          # values/ic_launcher_background.xml. These collide with our overlay's
          # splash.xml / colors-electerm.xml (same resource name, different file),
          # so drop the template's copies after overlaying ours.
          rm -f build/android/android/app/src/main/res/drawable/splash.png
          rm -f build/android/android/app/src/main/res/values/ic_launcher_background.xml

      - name: Build debug APK
        run: cd build/android/android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Build release APK (signed with ephemeral keystore)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || 'android' }}
        run: |
          cd build/android/android
          # Gradle resolves the injected store.file relative to the :app module
          # dir (build/android/android/app), so generate the keystore there and
          # pass the same absolute path to gradle.
          KEYSTORE="$PWD/app/release.keystore"
          keytool -genkey -v \
            -keystore "$KEYSTORE" -alias electerm \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$KEYSTORE_PASSWORD" -keypass "$KEY_PASSWORD" \
            -dname "CN=electerm"
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias=electerm \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: electerm-android-apks
          path: |
            build/android/android/app/build/outputs/apk/debug/*.apk
            build/android/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30
